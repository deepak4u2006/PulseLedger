disabled_rules:
  - trailing_whitespace
opt_in_rules:
  - empty_count
  - explicit_init
  - redundant_nil_coalescing
line_length:
  warning: 120
  error: 200
type_body_length:
  warning: 350
file_length:
  warning: 600
  error: 1200
identifier_name:
  min_length:
    warning: 2
excluded:
  - DerivedData
  - .build
  - PulseLedger.xcodeproj
