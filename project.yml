name: PulseLedger
options:
  bundleIdPrefix: com.deepak.portfolio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  PulseCore:
    path: Packages/PulseCore
  PulseDesign:
    path: Packages/PulseDesign
  PulseNetworking:
    path: Packages/PulseNetworking
  PulseSecurity:
    path: Packages/PulseSecurity
  PulseNotify:
    path: Packages/PulseNotify
  PulseBridge:
    path: Packages/PulseBridge
  PulseAuth:
    path: Packages/PulseAuth
  PulseTransactions:
    path: Packages/PulseTransactions
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.5.0"
targets:
  PulseLedger:
    type: application
    platform: iOS
    sources:
      - path: PulseLedger
        excludes:
          - "**/Data/**"
          - "**/Domain/**"
          - "**/Presentation/**"
          - "**/Services/**"
          - "Money.swift"
          - "FintechTheme.swift"
    resources:
      - path: PulseLedger/Resources
    dependencies:
      - package: PulseCore
      - package: PulseDesign
      - package: PulseNetworking
      - package: PulseSecurity
      - package: PulseNotify
      - package: PulseBridge
      - package: PulseAuth
      - package: PulseTransactions
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.deepak.portfolio.pulseledger
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_NSFaceIDUsageDescription: "PulseLedger uses Face ID to unlock your dashboard."
      TARGETED_DEVICE_FAMILY: "1,2"
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - PulseLedgerTests
  PulseLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PulseLedgerTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PulseLedger
      - package: PulseCore
      - package: PulseSecurity
