name: PulseLedger
options:
  bundleIdPrefix: com.deepak.portfolio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  PulseLedger:
    type: application
    platform: iOS
    sources:
      - path: PulseLedger
    resources:
      - path: PulseLedger/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.deepak.portfolio.pulseledger
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - PulseLedgerTests
  PulseLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PulseLedgerTests
    resources:
      - path: PulseLedger/Resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PulseLedger
